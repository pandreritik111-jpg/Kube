name: Security Scan
 
on:
  push:
    branches: [ main ]
 
jobs:
  scan:
    runs-on: ubuntu-latest
 
    steps:
    - uses: actions/checkout@v3
 
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
        sudo dpkg -i trivy_*.deb
 
    - name: Run Scan
      run: trivy fs .
 
